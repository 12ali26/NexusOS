<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nexus Desktop</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, Arial, sans-serif;
        background: #07111f;
        color: #f5f7fa;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 75% 15%, #ff7a1a33, transparent 32rem),
          linear-gradient(135deg, #07111f, #10283d);
      }
      main { width: min(920px, 90vw); }
      .brand { display: flex; align-items: center; gap: 14px; }
      .icon {
        display: grid; place-items: center; width: 52px; height: 52px;
        border-radius: 14px; background: #ff7a1a; font-size: 29px;
        font-weight: 800;
      }
      h1 { margin: 0; letter-spacing: .08em; font-size: 30px; }
      p { color: #b8cad9; font-size: 17px; line-height: 1.6; }
      .links {
        display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
        gap: 14px; margin-top: 34px;
      }
      a {
        padding: 18px; border: 1px solid #ffffff18; border-radius: 16px;
        color: #eef6fc; text-decoration: none; background: #ffffff0c;
      }
      a:hover { border-color: #ff7a1a88; background: #ff7a1a14; }
      strong { display: block; margin-bottom: 7px; color: #ff9a52; }
      small { color: #a7bdce; }
    </style>
  </head>
  <body>
    <main>
      <div class="brand"><div class="icon">N</div><h1>NEXUS DESKTOP</h1></div>
      <p>Your cloud workstation is ready. Use the taskbar to open your browser,
        files, terminal, workspace, and settings.</p>
      <div class="links">
        <a href="https://www.google.com"><strong>Web</strong><small>Search and work online</small></a>
        <a href="https://workspace.google.com"><strong>Google Workspace</strong><small>Documents, mail, and collaboration</small></a>
        <a href="https://github.com"><strong>GitHub</strong><small>Code and project collaboration</small></a>
        <a href="https://chatgpt.com"><strong>AI Tools</strong><small>Open your preferred web tools</small></a>
      </div>
    </main>
  </body>
</html>
