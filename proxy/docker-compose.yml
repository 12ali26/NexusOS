services:
  nexus-proxy:
    image: caddy:2-alpine
    container_name: nexus-proxy
    command: ["caddy", "run", "--config", "/etc/caddy/Caddyfile"]
    volumes:
      - ./Caddyfile.prototype:/etc/caddy/Caddyfile:ro
    ports:
      - "8088:8088"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - nexus-network

networks:
  nexus-network:
    external: true
